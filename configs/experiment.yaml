seed: 42

paths:
  clean_train_path: artifacts/data/clean_train.jsonl
  synth_path: artifacts/data/synth_head.jsonl
  tail_test_path: artifacts/data/tail_test.jsonl
  tail_tokens_path: artifacts/data/tail_tokens.json
  output_root: artifacts/runs

model:
  base_model_name: gpt2

training:
  block_size: 128
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_train_steps: 800
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  logging_steps: 20
  save_steps: 200
  eval_steps: 200
  mixed_precision: null
  num_proc: 1

experiment:
  total_train_samples: 9000
  mixtures:
    - name: 100_clean_0_synth
      clean_ratio: 1.0
      synth_ratio: 0.0
    - name: 75_clean_25_synth
      clean_ratio: 0.75
      synth_ratio: 0.25
    - name: 50_clean_50_synth
      clean_ratio: 0.50
      synth_ratio: 0.50
    - name: 0_clean_100_synth
      clean_ratio: 0.0
      synth_ratio: 1.0

evaluation:
  batch_size: 2
  max_eval_samples: null
